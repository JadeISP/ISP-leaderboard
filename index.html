<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title> ISP Leaderboard </title>
  <style>
    body {
      background-color: black;
      font-family: sans-serif;
    }

    h1 {
      color: white;
      text-align: center;
      border-bottom: 5px solid gray;
      position: absolute;
      width: 100%;
      top: 0;
    }

    .tab {
      transform-origin: top left;
      display: inline-block;
      background: black;
      color: white;
      text-align: center;
      cursor: pointer;
      position: relative;
      border: 1px solid white;
      border-image: linear-gradient(to bottom, black 0%, darkgray 50%, lightgray 100%) 1;
      box-shadow: inset 0 -1px 0 white;
      transition: box-shadow 0.5s, transform 0.3s ease-in;
    }

    .tab:active,
    .tab:hover {
      z-index: 1;
      transform: scale(1.05);
      box-shadow: inset 0 -1px 0 white, 4px 5px 6px rgba(245, 245, 245, 0.5);
    }

    #wrapper_2 {
      display: flex;
      flex-direction: row;
    }

    #tab1 {
      top: 0%;
      left: 0%;
      height: 50px;
      width: 75px;
    }

    #tab2 {
      top: 0%;
      left: 5px;
      height: 50px;
      width: 160px;
      font-size: 12px;
    }

    #container {
      position: absolute;
      left: 0%;
      top: 20%;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    table {
      table-layout: fixed;
      width: 40%;
      max-width: 700px;
      border-collapse: collapse;
      position: relative;
      z-index: 999;
    }

    th {
      padding: 10px 20px;
      color: white;
      border: 1px solid gray;
    }

    td {
      user-select: none;
      color: white;
      padding: 10px 20px;
      border-top: 1px solid gray;
      border-bottom: 1px solid gray;
      white-space: pre-wrap;
    }

    .first {
      border-left: 1px solid gray;
    }

    .third {
      border-right: 1px solid gray;
    }

    tr:hover td {
      background-color: gray;
    }

    .hidden {
      display: none;
    }

    .active {
      display: table;
    }
  </style>
</head>
<body>
  <h1>Leaderboard:</h1>

  <div id="container">
    <span id="wrapper_2">
      <button id="tab1" class="tab" onclick="change('a')">Speedrun</button>
      <button id="tab2" class="tab" onclick="change('b')">Mininum Time Travel (TT)</button>
    </span>

    <table id="a" class="active">
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Score</th>
      </tr>
      <tr>
      </tr>
      <tr>
      </tr>
    </table>

    <table id="b" class="hidden">
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Score</th>
      </tr>
      <tr>
      </tr>
    </table>
  </div>

  <script>
    window.onload = () => {
      function addElement(el, type) {
        const t = document.createElement("tr")
        const td1 = document.createElement("td")
        const td2 = document.createElement("td")
        const td3 = document.createElement("td")
        td1.classList.add("first");
        td3.classList.add("third");
        td1.textContent = el.name
        td2.textContent = el.type;
        td3.textContent = el.score;
        t.appendChild(td1);
        t.appendChild(td2);
        t.appendChild(td3);
    
        type === "Speedrun" ? a.children[0].appendChild(t) : b.children[0].appendChild(t)
    }
    const a = {
        name: "Threnody",
        type: "Speedrun (lvl: 3501)",
       score: "7 hours 5 minutes"
    }
    const b = {
        name: "Berry",
        type: "Speedrun (lvl: 3501)",
        score: "3 days";
    }
    const c = {
        name: "Jade",
        type: "Low TT (3500 Kill)",
        score: "TT 0"
    }
  }
    function change(id) {
      const active = document.querySelector(".active");
      const next = document.getElementById(id);

      if (active === next) return;

      active.classList.remove("active");
      active.classList.add("hidden");

      next.classList.remove("hidden");
      next.classList.add("active");
    }
  </script>
</body>
</html>
